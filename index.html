<!DOCTYPE html>

<html lang="ko">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
.hdr{background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;padding:18px 20px;box-shadow:0 2px 12px rgba(37,99,235,0.25);display:flex;justify-content:space-between;align-items:flex-start}
.hdr-left h1{font-size:18px;font-weight:800}
.hdr-left p{font-size:11px;opacity:0.7;margin-top:4px}
.hdr-right{font-size:9px;opacity:0.5;text-align:right;padding-top:2px}
.bar{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;background:#fff;border-bottom:1px solid #e2e8f0}
.bar button{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 10px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.bar button:active{transform:scale(0.97)}
.b1{background:#2563eb;color:#fff;box-shadow:0 2px 8px rgba(37,99,235,0.25)}
.b2{background:#ef4444;color:#fff;box-shadow:0 2px 8px rgba(239,68,68,0.25)}
.b3{background:#10b981;color:#fff;box-shadow:0 2px 8px rgba(16,185,129,0.25)}
.b4{background:#f59e0b;color:#fff;box-shadow:0 2px 8px rgba(245,158,11,0.25)}
.b5{background:#8b5cf6;color:#fff;box-shadow:0 2px 8px rgba(139,92,246,0.25)}
.b6{background:#06b6d4;color:#fff;box-shadow:0 2px 8px rgba(6,182,212,0.25)}
.bfull{grid-column:1/-1}
.bi{font-size:16px}
.info{padding:8px 12px;background:#fff;border-bottom:1px solid #eee;font-size:12px;color:#666;display:flex;justify-content:space-between}
.info b{color:#2563eb}
.wrap{padding:12px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

.item{background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e0e0e0;position:relative}
.item.dragging{opacity:0.4;border:2px dashed #2563eb}
.item.dragover{border:2px solid #2563eb;box-shadow:0 0 12px rgba(37,99,235,0.3)}
.desc{width:100%;border:none;border-bottom:1px solid #eee;padding:6px 8px;font-size:10px;resize:none;height:28px;font-family:inherit;outline:none;color:#333;text-align:center}
.desc:focus{background:#f0f7ff}
.imgbox{position:relative;width:100%;padding-top:100%;background:#e8e8e8}
.imgbox img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}

.chk{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;border:2px solid #fff;background:rgba(0,0,0,0.3);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.chk.on{background:#ef4444;border-color:#ef4444}
.draghandle{position:absolute;bottom:3px;right:3px;width:24px;height:24px;border-radius:6px;background:rgba(37,99,235,0.8);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:grab;z-index:5}
.delbar{background:#fef2f2;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #fecaca}
.delbar span{color:#ef4444;font-size:13px;font-weight:700}
.delbar button{padding:7px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.dc{background:#ef4444;color:#fff;margin-left:6px}
.dx{background:#fff;color:#666;border:1px solid #ddd}
.sortbar{background:#eff6ff;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #bfdbfe}
.sortbar span{color:#2563eb;font-size:13px;font-weight:700}
.sortbar button{padding:7px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;background:#2563eb;color:#fff}
.empty{text-align:center;padding:60px 20px;color:#999}
.empty div:first-child{font-size:50px;margin-bottom:10px}
.empty h3{color:#666;font-size:16px;margin-bottom:6px}
.empty p{font-size:13px;line-height:1.6}
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.dlg{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:340px;box-shadow:0 16px 48px rgba(0,0,0,0.15)}
.dlg h3{font-size:16px;font-weight:800;margin-bottom:4px}

.dlg input:focus{border-color:#2563eb}
.dbtns{display:flex;gap:8px;margin-top:14px}
.dbtns button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.dok{background:#2563eb;color:#fff}
.dno{background:#f0f0f0;color:#888}
.tst{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:200}
.ldg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:150}
.sp{width:30px;height:30px;border:3px solid #ddd;border-top-color:#2563eb;border-radius:50%;animation:spn .6s linear infinite}
@keyframes spn{to{transform:rotate(360deg)}}
.ldg p{margin-top:10px;font-size:13px;color:#666;font-weight:600}
</style>
</head>
